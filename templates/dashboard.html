<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#4facfe;
color:white;
}

.home-btn{
text-decoration:none;
color:white;
font-size:20px;
}

/* TOP SECTION */
.top-section{
display:flex;
gap:20px;
padding:20px;
flex-wrap:wrap;
}

/* FORM */
.form-box{
flex:1;
min-width:300px;
background:white;
padding:15px;
border-radius:10px;
}

/* RESULT */
.result-box{
flex:1;
min-width:250px;
background:white;
padding:15px;
border-radius:10px;
}

/* CHARTS */
.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.chart-box{
background:white;
padding:10px;
border-radius:10px;
}

canvas{height:180px !important;}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<h2>📊 Dashboard</h2>
<a href="/home" class="home-btn">🏠</a>
</div>

<!-- INPUT + RESULT -->
<div class="top-section">

<!-- 🔥 INPUT FORM -->
<div class="form-box">

<h3>Predict Food Wait Time</h3>

<form id="dashForm">

<select id="restaurantSelect" name="restaurant"></select>

<select id="foodSelect" name="food"></select>

<br><br>

<input type="number" name="hour" min="1" max="12" placeholder="Hour" required>

<select name="ampm">
<option>AM</option>
<option>PM</option>
</select>

<select name="day">
<option value="0">Mon</option>
<option value="1">Tue</option>
<option value="2">Wed</option>
<option value="3">Thu</option>
<option value="4">Fri</option>
<option value="5">Sat</option>
<option value="6">Sun</option>
</select>

<br><br>

<button type="submit">Predict</button>

</form>

</div>

<!-- 📊 RESULT -->
<div class="result-box">

<h3>Prediction Result</h3>

<div id="result">
<p><b>Selected:</b> {{selected}}</p>
<p><b>Rush:</b> {{rush}}</p>
<p><b>Wait:</b> {{wait}} mins</p>
<p><b>Best:</b> {{best}} ({{best_time}} mins)</p>
</div>

</div>

</div>

<!-- 📈 GRAPHS -->
<div class="chart-grid">

<div class="chart-box">
<h4>📈 Best Time to Visit</h4>
<canvas id="trend"></canvas>
</div>

<div class="chart-box">
<h4>⚡ Fastest Restaurants</h4>
<canvas id="fast"></canvas>
</div>

<div class="chart-box">
<h4>📊 Comparison</h4>
<canvas id="compare"></canvas>
</div>

</div>

<script>

// MENU DATA
let menuData = {{ menu | tojson }};

// LOAD RESTAURANTS
let rSelect = document.getElementById("restaurantSelect");

Object.keys(menuData).forEach(r=>{
let o=document.createElement("option");
o.value=r;
o.text=r;
rSelect.appendChild(o);
});

// LOAD FOODS
function loadFoods(r){
let fSelect=document.getElementById("foodSelect");
fSelect.innerHTML="";

menuData[r].forEach(f=>{
let o=document.createElement("option");
o.value=f;
o.text=f;
fSelect.appendChild(o);
});
}

loadFoods(rSelect.value);

rSelect.addEventListener("change",function(){
loadFoods(this.value);
});

// INITIAL DATA
let labels={{labels|tojson}};
let values={{values|tojson}};
let trend={{trend|tojson}};

// CHARTS
let trendChart=new Chart(document.getElementById("trend"),{
type:"line",
data:{
labels:["Morning","Noon","Evening","Night"],
datasets:[{label:"Rush Level",data:trend}]
}
});

let fastChart=new Chart(document.getElementById("fast"),{
type:"bar",
data:{labels:labels,datasets:[{label:"Wait Time",data:values}]},
options:{indexAxis:'y'}
});

let compareChart=new Chart(document.getElementById("compare"),{
type:"bar",
data:{labels:labels,datasets:[{label:"Wait Time",data:values}]}
});

// 🔥 PREDICT + UPDATE
document.getElementById("dashForm").addEventListener("submit",function(e){
e.preventDefault();

fetch("/predict",{
method:"POST",
body:new FormData(this)
})
.then(r=>r.json())
.then(d=>{

// UPDATE RESULT
document.getElementById("result").innerHTML=
`<p><b>Rush:</b> ${d.rush}</p>
<p><b>Wait:</b> ${d.wait} mins</p>`;

// UPDATE CHARTS
trendChart.data.datasets[0].data = d.trend;
trendChart.update();

fastChart.data.labels = d.labels;
fastChart.data.datasets[0].data = d.values;
fastChart.update();

compareChart.data.labels = d.labels;
compareChart.data.datasets[0].data = d.values;
compareChart.update();

});
});

</script>

</body>
</html>
